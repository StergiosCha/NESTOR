# Sample sweep config for the Phase 1 bulk runner.
#
# Run with:
#   cd nestor
#   python -m phase1_nli_eval.run_bulk --config phase1_nli_eval/sweep_config.yaml
#
# The Cartesian product of the four dimensions is expanded into one combo per
# {dataset, model, technique, language}. Each combo writes to its own JSON at
# phase1_nli_eval/results/{dataset}__{model}__{technique}__{language}.json
# and is resumed from disk by default.

# fracas | fracas-translated | fracas-extended | fracas-multilabel | oyxoy
datasets:
  - fracas

# gpt-4o | gpt-5.4 | deepseek-r1 | deepseek-v4-pro | llama-3.3-70b | llama-4-maverick 
# mistral-large-3 | phi-4 | grok-4-20 | grok-4-20-reasoning | krikri-8b
models:
  - gpt-4o

# zero-shot | few-shot | cot
techniques:
  - zero-shot
  - few-shot

# en | el 
languages:
  - en

resume: true  # true = skip completed + retry nulls; false = start fresh
limit:        # cap samples per combo; null = no cap
